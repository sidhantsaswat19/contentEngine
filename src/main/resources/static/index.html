<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlitrAI - Mini Content Engine</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 600px; margin: 3rem auto; padding: 0 1rem; color: #333; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-weight: bold; margin-bottom: 0.5rem; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        button { background-color: #000; color: #fff; padding: 0.75rem 1.5rem; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; }
        button:disabled { background-color: #888; cursor: not-allowed; }
        #job-status-container { margin-top: 2rem; padding: 1.5rem; border: 1px solid #eaeaea; border-radius: 6px; display: none; background: #fafafa; }
        #result-image { max-width: 100%; margin-top: 1rem; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        .pending { background-color: #fef08a; color: #854d0e; }
        .processing { background-color: #bfdbfe; color: #1e40af; }
        .completed { background-color: #bbf7d0; color: #166534; }
        .failed { background-color: #fecaca; color: #991b1b; }
    </style>
</head>
<body>
<h1>Mini Content Engine</h1>
<p>Generate AI lifestyle assets from product inputs.</p>

<form id="generate-form">
    <div class="form-group">
        <label for="productName">Product Name</label>
        <input type="text" id="productName" required placeholder="e.g., Florentine Wooden Salad Bowl" value="Florentine Wooden Salad Bowl">
    </div>
    <div class="form-group">
        <label for="description">Product Description</label>
        <textarea id="description" required rows="3" placeholder="A match made in summer...">A match made in summer - salads and wooden bowls. Handpainted on mango wood, this compact salad bowl serves a supper for two.</textarea>
    </div>
    <div class="form-group">
        <label for="productImageUrl">Product Image URL</label>
        <input type="url" id="productImageUrl" required placeholder="https://..." value="https://www.chumbak.com/cdn/shop/files/1_0e96da8e-e4d6-4e42-883c-56c29524d41a.jpg">
    </div>
    <button type="submit" id="submit-btn">Generate Asset</button>
</form>

<div id="job-status-container">
    <h3 style="margin-top: 0;">Job Status</h3>
    <p style="font-size: 0.9rem; color: #666;">ID: <span id="display-job-id"></span></p>
    <p>Status: <span id="display-status" class="status-badge pending">pending</span></p>

    <div id="image-container" style="display: none;">
        <h4 style="margin-bottom: 0.5rem;">Final Result:</h4>
        <!-- Displays the image returned by the mock API -->
        <img id="result-image" src="" alt="Generated AI Asset">
    </div>
</div>

<script>
    document.getElementById('generate-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const btn = document.getElementById('submit-btn');
        const statusContainer = document.getElementById('job-status-container');
        const displayStatus = document.getElementById('display-status');
        const displayJobId = document.getElementById('display-job-id');
        const imageContainer = document.getElementById('image-container');
        const resultImage = document.getElementById('result-image');

        // 1. Reset the UI for a new job
        btn.disabled = true;
        btn.textContent = 'Processing (Please wait...)';
        statusContainer.style.display = 'block';
        imageContainer.style.display = 'none';
        displayStatus.textContent = 'pending';
        displayStatus.className = 'status-badge pending';

        const payload = {
            productName: document.getElementById('productName').value,
            description: document.getElementById('description').value,
            productImageUrl: document.getElementById('productImageUrl').value
        };

        try {
            // 2. Submit the POST request to the backend
            const response = await fetch('/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            const jobId = data.jobId;
            displayJobId.textContent = jobId;

            // 3. Set up the polling mechanism to check GET /jobs/:id every 2 seconds
            const pollInterval = setInterval(async () => {
                try {
                    const jobResponse = await fetch(`/jobs/${jobId}`);
                    const jobData = await jobResponse.json();

                    // Update the badge dynamically
                    displayStatus.textContent = jobData.status;
                    displayStatus.className = `status-badge ${jobData.status}`;

                    // 4. Handle Completion
                    if (jobData.status === 'completed') {
                        clearInterval(pollInterval); // Stop polling

                        // Using your specific key: resultImgUrl
                        resultImage.src = jobData.resultImgUrl;
                        imageContainer.style.display = 'block';

                        btn.disabled = false;
                        btn.textContent = 'Generate New Asset';
                    } else if (jobData.status === 'failed') {
                        clearInterval(pollInterval); // Stop polling
                        btn.disabled = false;
                        btn.textContent = 'Try Again';
                    }
                } catch (pollError) {
                    console.error('Polling error:', pollError);
                }
            }, 2000);

        } catch (error) {
            console.error('Submission Error:', error);
            alert('Failed to submit the job. Check the console.');
            btn.disabled = false;
            btn.textContent = 'Generate Asset';
        }
    });
</script>
</body>
</html>
